<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketEscape</title>
    <style>
      :root {
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      }
      body {
        margin: 0;
        width: 360px;
        background: #f4f4f4;
        color: #1f1f1f;
      }
      .container {
        padding: 12px;
      }
      h1 {
        margin: 0 0 10px;
        font-size: 18px;
      }
      .card {
        background: #fff;
        border: 1px solid #ddd;
        border-radius: 8px;
        padding: 10px;
        margin-bottom: 10px;
      }
      .line {
        margin-bottom: 6px;
        font-size: 13px;
        word-break: break-all;
      }
      .buttons {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
      }
      button {
        border: 1px solid #2d2d2d;
        border-radius: 6px;
        padding: 7px 10px;
        font-weight: 700;
        background: #fff;
        cursor: pointer;
      }
      button.primary {
        background: #1f78ff;
        border-color: #1f78ff;
        color: #fff;
      }
      .small {
        font-size: 12px;
        color: #555;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>TicketEscape</h1>

      <section class="card">
        <div class="line"><strong>状態:</strong> <span id="statusState">-</span></div>
        <div class="line"><strong>詳細:</strong> <span id="statusDetail">-</span></div>
      </section>

      <section class="card">
        <div class="line"><strong>URL:</strong> <span id="jobUrl">-</span></div>
        <div class="line"><strong>実行時刻:</strong> <span id="jobTrigger">-</span></div>
        <div class="line"><strong>券種数:</strong> <span id="jobTicketCount">-</span></div>
      </section>

      <section class="card">
        <div class="line"><strong>前回実行:</strong> <span id="lastRunStatus">-</span></div>
        <div class="line small" id="lastRunDetail">-</div>
      </section>

      <section class="buttons">
        <button id="executeNowButton" class="primary">今すぐ実行</button>
        <button id="refreshButton">更新</button>
        <button id="openOptionsButton">設定</button>
      </section>
    </div>

    <script src="../lib/shared.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
