<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketEscape</title>
    <style>
      /* ── Design System ─────────────────────────────────────────
         Base:   #edf0f7  (cool light gray)
         Main:   #141a2e  (deep navy)
         Accent: #6c63ff  (vivid indigo-purple)
      ─────────────────────────────────────────────────────────── */
      :root {
        --bg:          #edf0f7;
        --surface:     #ffffff;
        --surface-sub: #f5f7fc;
        --border:      #dde2ef;
        --border-str:  #bdc5d8;

        --tx:    #141a2e;
        --tx-b:  #3c4766;
        --tx-m:  #7d89a2;

        --ac:    #6c63ff;
        --ac-h:  #5a52e8;
        --ac-s:  rgba(108, 99, 255, 0.09);
        --ac-tx: #4f48d9;

        --green:   #0bb870;
        --green-s: rgba(11, 184, 112, 0.11);
        --amber:   #f0a500;
        --amber-s: rgba(240, 165, 0, 0.11);
        --red:     #e53535;
        --red-s:   rgba(229, 53, 53, 0.11);
        --blue:    #3b82f6;
        --blue-s:  rgba(59, 130, 246, 0.11);

        --r1: 6px;
        --r2: 10px;
        --r3: 14px;
        --r4: 20px;

        --sh1: 0 1px 3px rgba(20, 26, 46, .06), 0 1px 2px rgba(20, 26, 46, .04);
        --sh2: 0 4px 14px rgba(20, 26, 46, .08), 0 2px 4px rgba(20, 26, 46, .04);

        --font: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui,
                "Hiragino Sans", "Yu Gothic UI", sans-serif;
        --mono: "SF Mono", ui-monospace, SFMono-Regular, Menlo, monospace;
      }

      * { box-sizing: border-box; margin: 0; padding: 0; }

      body {
        width: 360px;
        background: var(--bg);
        color: var(--tx);
        font-family: var(--font);
        font-size: 13px;
        line-height: 1.5;
      }

      /* ── Header ── */
      .header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        padding: 14px 16px 10px;
      }

      .logo {
        display: flex;
        align-items: center;
        gap: 8px;
      }

      .logo-mark {
        width: 30px;
        height: 30px;
        background: linear-gradient(135deg, var(--ac) 0%, #a78bfa 100%);
        border-radius: var(--r2);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 16px;
        box-shadow: 0 2px 8px rgba(108, 99, 255, 0.35);
      }

      .logo-name {
        font-size: 15px;
        font-weight: 700;
        letter-spacing: -0.01em;
        color: var(--tx);
      }

      /* ── Status badge ── */
      .s-badge {
        display: inline-flex;
        align-items: center;
        gap: 5px;
        padding: 3px 9px 3px 7px;
        border-radius: 99px;
        font-size: 11px;
        font-weight: 700;
        letter-spacing: 0.02em;
        transition: background 200ms, color 200ms;
      }
      .s-badge::before {
        content: '';
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: currentColor;
        flex-shrink: 0;
      }
      .s-badge.idle    { background: var(--surface-sub); color: var(--tx-m); border: 1px solid var(--border); }
      .s-badge.standby { background: var(--blue-s);  color: var(--blue); }
      .s-badge.running { background: var(--amber-s); color: var(--amber); }
      .s-badge.success { background: var(--green-s); color: var(--green); }
      .s-badge.failed  { background: var(--red-s);   color: var(--red); }

      .s-badge.standby::before,
      .s-badge.running::before {
        animation: dot-pulse 1.4s ease-in-out infinite;
      }

      @keyframes dot-pulse {
        0%, 100% { opacity: 1; transform: scale(1); }
        50%       { opacity: .5; transform: scale(.8); }
      }

      /* ── Main card ── */
      .main-card {
        margin: 0 12px;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r4);
        box-shadow: var(--sh2);
        overflow: hidden;
      }

      /* Event section */
      .ev-section {
        padding: 16px 18px 14px;
        border-bottom: 1px solid var(--border);
        position: relative;
      }

      .ev-eyebrow {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.1em;
        text-transform: uppercase;
        color: var(--tx-m);
        margin-bottom: 4px;
      }

      .ev-title {
        font-size: 16px;
        font-weight: 700;
        line-height: 1.35;
        color: var(--tx);
        letter-spacing: -0.01em;
        word-break: break-all;
      }

      .ev-title.empty {
        color: var(--tx-m);
        font-weight: 500;
        font-size: 13px;
        font-style: italic;
      }

      .ev-url {
        margin-top: 5px;
        font-size: 11px;
        color: var(--tx-m);
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
        display: flex;
        align-items: center;
        gap: 4px;
      }

      .ev-url::before {
        content: '🔗';
        font-size: 10px;
        flex-shrink: 0;
      }

      /* Meta section */
      .meta-section {
        padding: 12px 18px;
        display: grid;
        gap: 9px;
      }

      .meta-row {
        display: flex;
        align-items: flex-start;
        gap: 10px;
      }

      .meta-ico {
        width: 28px;
        height: 28px;
        border-radius: var(--r1);
        background: var(--surface-sub);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        flex-shrink: 0;
        margin-top: 1px;
      }

      .meta-info {}

      .meta-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.07em;
        text-transform: uppercase;
        color: var(--tx-m);
        margin-bottom: 1px;
      }

      .meta-value {
        font-size: 13px;
        font-weight: 600;
        color: var(--tx-b);
        font-variant-numeric: tabular-nums;
      }

      .ticket-chips {
        display: flex;
        flex-wrap: wrap;
        gap: 4px;
        margin-top: 3px;
      }

      .ticket-chip {
        display: inline-flex;
        align-items: center;
        gap: 3px;
        padding: 2px 7px;
        background: var(--ac-s);
        border: 1px solid rgba(108, 99, 255, 0.18);
        border-radius: 99px;
        font-size: 11px;
        font-weight: 600;
        color: var(--ac-tx);
      }

      /* ── Countdown block ── */
      .countdown-block {
        margin: 8px 12px 0;
        background: var(--surface);
        border: 1px solid var(--border);
        border-radius: var(--r3);
        padding: 14px 16px;
        box-shadow: var(--sh1);
        display: flex;
        align-items: center;
        gap: 14px;
      }

      .cd-icon {
        font-size: 22px;
        flex-shrink: 0;
      }

      .cd-body {
        flex: 1;
        min-width: 0;
      }

      .cd-label {
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0.08em;
        text-transform: uppercase;
        color: var(--tx-m);
        margin-bottom: 2px;
      }

      .cd-value {
        font-family: var(--mono);
        font-size: 24px;
        font-weight: 700;
        letter-spacing: 0.04em;
        line-height: 1;
        color: var(--ac);
        font-variant-numeric: tabular-nums;
      }

      .cd-value.col-standby { color: var(--blue); }
      .cd-value.col-success { color: var(--green); }
      .cd-value.col-failed  { color: var(--red); }

      /* ── Button ── */
      .btn-open {
        display: flex;
        align-items: center;
        justify-content: center;
        gap: 6px;
        margin: 10px 12px 14px;
        width: calc(100% - 24px);
        padding: 11px 16px;
        background: var(--ac);
        color: #fff;
        border: none;
        border-radius: var(--r2);
        font-family: var(--font);
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
        letter-spacing: 0.01em;
        transition: background 120ms ease, transform 80ms ease,
          box-shadow 120ms ease;
        box-shadow: 0 2px 8px rgba(108, 99, 255, .30);
      }

      .btn-open:hover {
        background: var(--ac-h);
        transform: translateY(-1px);
        box-shadow: 0 4px 14px rgba(108, 99, 255, .38);
      }

      .btn-open:active {
        transform: translateY(0);
        box-shadow: 0 1px 4px rgba(108, 99, 255, .25);
      }

      /* ── Empty state ── */
      .empty-state {
        padding: 28px 20px;
        text-align: center;
      }

      .empty-icon {
        font-size: 36px;
        margin-bottom: 10px;
        display: block;
      }

      .empty-title {
        font-size: 14px;
        font-weight: 700;
        color: var(--tx-b);
        margin-bottom: 5px;
      }

      .empty-body {
        font-size: 12px;
        color: var(--tx-m);
        line-height: 1.7;
      }

      /* Result states */
      .result-block {
        padding: 20px 18px;
        text-align: center;
      }

      .result-icon {
        font-size: 40px;
        margin-bottom: 8px;
        display: block;
      }

      .result-title {
        font-size: 18px;
        font-weight: 700;
        margin-bottom: 4px;
      }

      .result-sub {
        font-size: 12px;
        color: var(--tx-m);
      }
    </style>
  </head>
  <body>
    <div class="header">
      <div class="logo">
        <div class="logo-mark">🎫</div>
        <span class="logo-name">TicketEscape</span>
      </div>
      <div id="statusBadge" class="s-badge idle">IDLE</div>
    </div>

    <div id="mainCard" class="main-card">
      <div class="empty-state">
        <span class="empty-icon">⚙️</span>
        <div class="empty-title">設定がありません</div>
        <div class="empty-body">設定画面でURLと実行時刻を<br>保存してください。</div>
      </div>
    </div>

    <div id="countdownBlock" class="countdown-block" style="display:none">
      <div class="cd-icon">⏱</div>
      <div class="cd-body">
        <div class="cd-label">カウントダウン</div>
        <div id="cdValue" class="cd-value">--:--:--</div>
      </div>
    </div>

    <button id="openOptionsButton" class="btn-open" type="button">
      設定画面を開く →
    </button>

    <script src="../lib/shared.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
