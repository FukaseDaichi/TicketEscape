<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>TicketEscape</title>
    <style>
      :root {
        --base-color: #f1f6f3;
        --base-color-deep: #e6efe9;
        --surface-color: #ffffff;
        --text-color: #152019;
        --muted-color: #546359;
        --border-color: #ccdad1;
        --accent-color: #1f9d72;
        --accent-color-strong: #187a59;
        font-family: "Hiragino Kaku Gothic ProN", "Yu Gothic", sans-serif;
      }
      body {
        margin: 0;
        width: 360px;
        background:
          radial-gradient(circle at 100% 0%, #edf7f1 0%, transparent 32%),
          linear-gradient(145deg, var(--base-color), var(--base-color-deep));
        color: var(--text-color);
      }
      .container {
        padding: 14px;
        display: grid;
        gap: 12px;
      }
      h1 {
        margin: 0;
        font-size: 22px;
        letter-spacing: 0.02em;
      }
      .subtitle {
        margin: 4px 0 0;
        font-size: 13px;
        color: var(--muted-color);
      }
      .hero {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 14px;
        box-shadow: 0 8px 20px rgba(18, 35, 26, 0.08);
      }
      .open-settings {
        margin-top: 10px;
        width: 100%;
        border: 1px solid var(--accent-color);
        border-radius: 9px;
        background: var(--accent-color);
        color: #fff;
        padding: 10px 12px;
        font-size: 14px;
        font-weight: 700;
        cursor: pointer;
        transition: background-color 120ms ease, border-color 120ms ease,
          transform 120ms ease;
      }
      .open-settings:hover {
        background: var(--accent-color-strong);
        border-color: var(--accent-color-strong);
        transform: translateY(-1px);
      }
      .open-settings:active {
        transform: translateY(0);
      }
      .card {
        background: var(--surface-color);
        border: 1px solid var(--border-color);
        border-radius: 12px;
        padding: 12px;
        box-shadow: 0 6px 16px rgba(17, 32, 24, 0.06);
      }
      .item {
        display: grid;
        gap: 5px;
      }
      .item + .item {
        margin-top: 12px;
      }
      .label {
        font-size: 12px;
        font-weight: 700;
        color: var(--muted-color);
        letter-spacing: 0.03em;
      }
      .value {
        font-size: 14px;
        line-height: 1.4;
        word-break: break-all;
      }
      .hint {
        margin: 0;
        font-size: 12px;
        color: var(--muted-color);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <section class="hero">
        <h1>TicketEscape</h1>
        <p class="subtitle">設定画面でURLと実行時刻を管理します。</p>
        <button id="openOptionsButton" class="open-settings" type="button">
          拡張機能の設定を開く
        </button>
      </section>

      <section class="card">
        <div class="item">
          <div class="label">URL</div>
          <div id="jobUrl" class="value">未設定</div>
        </div>
        <div class="item">
          <div class="label">実行時刻 (JST)</div>
          <div id="jobTrigger" class="value">未設定</div>
        </div>
      </section>

      <p id="messageText" class="hint">設定がない場合は先に設定画面で保存してください。</p>
    </div>

    <script src="../lib/shared.js"></script>
    <script src="./popup.js"></script>
  </body>
</html>
